# ─── Cloudflare Workers + D1 Configuration ──────────────────
# Run locally:  npx wrangler dev
# Deploy:       npx wrangler deploy
# D1 create:    npx wrangler d1 create eli-cms-db
# D1 migrate:   npx wrangler d1 migrations apply eli-cms-db

name = "eli-cms"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".output/server/index.mjs"

# ─── D1 Database Binding ────────────────────────────────────
# After creating your D1 database, replace the database_id below
# with the actual ID from: npx wrangler d1 create eli-cms-db

[[d1_databases]]
binding = "DB"
database_name = "eli-cms-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"

# ─── Environment Variables ──────────────────────────────────
# Set these via: npx wrangler secret put SECRET_NAME
# Or in the Cloudflare dashboard under Workers > Settings > Variables

[vars]
BETTER_AUTH_URL = "https://your-domain.com"
SITE_URL = "https://your-domain.com"

# ─── Build Configuration ────────────────────────────────────
# The build output is generated by Vite + Nitro
# Use the cloudflare-module preset in nitro config

# [build]
# command = "npm run build:cf"

# ─── Static Assets ──────────────────────────────────────────
# Serve static files from the public directory

# [site]
# bucket = ".output/public"
